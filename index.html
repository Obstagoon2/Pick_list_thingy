<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRC Pick List</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
:root{
  --bg:#ffffff;--bg2:#f4f4f4;--bg3:#e8e8e8;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --border:#d0d0d0;--border2:#bbb;
  --info-bg:#e6f1fb;--info-text:#185fa5;--info-border:#85b7eb;
  --danger-bg:#fcebeb;--danger-text:#a32d2d;--danger-border:#f09595;
  --success-text:#3b6d11;
  --total-color:#185fa5;
}
[data-theme=dark]{
  --bg:#1e1e1e;--bg2:#2a2a2a;--bg3:#333;
  --text:#e8e8e8;--text2:#aaa;--text3:#666;
  --border:#3a3a3a;--border2:#555;
  --info-bg:#0c2a45;--info-text:#78b4e8;--info-border:#1a5080;
  --danger-bg:#3a1515;--danger-text:#e88;--danger-border:#6a2a2a;
  --success-text:#7ec850;
  --total-color:#78b4e8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:14px;color:var(--text);background:var(--bg2);transition:background .2s,color .2s}
button{cursor:pointer;font-family:inherit;font-size:13px;padding:6px 12px;border:0.5px solid var(--border2);border-radius:6px;background:transparent;color:var(--text);transition:background .15s}
button:hover{background:var(--bg3)}
button.primary{background:var(--info-bg);color:var(--info-text);border-color:var(--info-border)}
button.danger{background:var(--danger-bg);color:var(--danger-text);border-color:var(--danger-border)}
input[type=text],input[type=number],textarea,select{font-family:inherit;font-size:13px;padding:5px 8px;border:0.5px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);width:100%}
textarea{resize:vertical;min-height:44px}
.layout{display:flex;gap:12px;padding:12px;min-height:100vh}
.sidebar{width:230px;flex-shrink:0;display:flex;flex-direction:column;gap:10px}
.main{flex:1;min-width:0;display:flex;flex-direction:column;gap:10px}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:10px;padding:12px}
.card h3{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.rank-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;border:0.5px solid var(--border);margin-bottom:3px;background:var(--bg)}
.rank-item.dnp{opacity:.4;text-decoration:line-through}
.rank-num{font-size:11px;color:var(--text3);min-width:16px;text-align:right}
.rank-score{font-size:11px;color:var(--text2);margin-left:auto;white-space:nowrap}
.table-wrap{overflow-x:auto;border-radius:8px;border:0.5px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--bg2);font-weight:500;padding:7px 8px;text-align:left;white-space:nowrap;border-bottom:0.5px solid var(--border);cursor:pointer;user-select:none}
th:hover{background:var(--bg3)}
td{padding:5px 8px;border-bottom:0.5px solid var(--border);vertical-align:top;background:var(--bg)}
tr:last-child td{border-bottom:none}
tr.dnp-row td{opacity:.45;background:var(--bg2)}
.score-input{width:50px;text-align:center;padding:3px 4px}
.notes-fields{display:flex;flex-direction:column;gap:3px;min-width:190px}
.note-row{display:flex;gap:5px;align-items:flex-start}
.note-label{font-size:10px;color:var(--text2);min-width:56px;padding-top:5px;font-weight:500}
.note-input{flex:1;font-size:11px;padding:3px 6px;min-height:30px}
.criteria-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.criteria-name{flex:1}
.criteria-weight{width:48px;text-align:center}
.top-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.total-col{font-weight:500;color:var(--total-color)}
/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg);border:1px solid var(--border2);border-radius:14px;padding:22px;width:460px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.35)}
.modal h2{font-size:15px;font-weight:500;margin-bottom:12px;color:var(--text)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:12px;border-top:0.5px solid var(--border)}
.status-bar{font-size:12px;padding:4px 0;min-height:20px}
.tag-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;background:var(--bg2);border:0.5px solid var(--border);font-size:11px;margin:2px;color:var(--text)}
.tag-chip button{border:none;background:none;padding:0;font-size:11px;color:var(--text3);cursor:pointer}
.flex-gap{display:flex;gap:8px}
.badge-src{display:inline-block;font-size:10px;padding:1px 5px;border-radius:3px;background:var(--bg2);color:var(--text3)}
.spinner{display:inline-block;width:11px;height:11px;border:2px solid var(--border2);border-top-color:var(--info-text);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
.skip-cols-list{max-height:200px;overflow-y:auto;border:0.5px solid var(--border);border-radius:6px;padding:8px;margin-top:6px;background:var(--bg2)}
.skip-cols-list label{display:flex;align-items:center;gap:8px;font-size:12px;padding:3px 0;cursor:pointer;color:var(--text)}
.theme-toggle{padding:5px 10px;border-radius:20px;font-size:12px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);cursor:pointer}
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <div class="card">
      <h3>Live Rankings</h3>
      <div id="rank-list"><p style="font-size:12px;color:var(--text3)">No teams yet</p></div>
    </div>
    <div class="card">
      <h3>Note Tags</h3>
      <div id="tag-list"></div>
      <div class="flex-gap" style="margin-top:8px">
        <input type="text" id="new-tag" placeholder="New tag..." style="flex:1">
        <button onclick="addTag()">+</button>
      </div>
    </div>
    <div class="card">
      <h3>Summary</h3>
      <div id="summary" style="font-size:12px;color:var(--text2);line-height:1.9"></div>
    </div>
  </div>
  <div class="main">
    <div class="card">
      <div class="top-bar">
        <input type="text" id="event-code" placeholder="Event code (e.g. 2025txhou)" style="width:190px">
        <button class="primary" onclick="fetchEventData()" id="fetch-btn">Pull TBA + Statbotics</button>
        <label style="padding:6px 12px;border:0.5px solid var(--info-border);border-radius:6px;background:var(--info-bg);color:var(--info-text);cursor:pointer;font-size:13px">
          Match CSV<input type="file" accept=".csv" style="display:none" onchange="loadCSV(event,'match')">
        </label>
        <label style="padding:6px 12px;border:0.5px solid var(--info-border);border-radius:6px;background:var(--info-bg);color:var(--info-text);cursor:pointer;font-size:13px">
          Pit CSV<input type="file" accept=".csv" style="display:none" onchange="loadCSV(event,'pit')">
        </label>
        <button onclick="openCriteriaModal()">Criteria</button>
        <button onclick="addTeamManual()">+ Team</button>
        <button onclick="exportCSV()" class="primary">Export</button>
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">Dark mode</button>
      </div>
      <div id="status-bar" class="status-bar"></div>
    </div>
    <div class="card" style="flex:1;overflow:hidden;padding:0">
      <div class="table-wrap">
        <table>
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Criteria Modal -->
<div id="criteria-modal" style="display:none" class="modal-backdrop">
  <div class="modal">
    <h2>Manage criteria & weights</h2>
    <p style="font-size:12px;color:var(--text2);margin-bottom:10px">Adjust weights (0 = ignored). TBA/Statbotics cols are read-only display.</p>
    <div id="criteria-list"></div>
    <button onclick="addCriteria()" style="margin-top:8px">+ Add manual criteria</button>
    <div class="modal-footer"><button onclick="closeCriteriaModal()">Done</button></div>
  </div>
</div>

<!-- Column Picker Modal -->
<div id="col-modal" style="display:none" class="modal-backdrop">
  <div class="modal">
    <h2 id="col-modal-title">Select columns to import</h2>
    <p style="font-size:12px;color:var(--text2);margin-bottom:4px">Uncheck columns you don't want as criteria.</p>
    <div style="display:flex;gap:8px;margin-bottom:6px">
      <button onclick="colCheckAll(true)" style="font-size:11px;padding:3px 8px">All</button>
      <button onclick="colCheckAll(false)" style="font-size:11px;padding:3px 8px">None</button>
    </div>
    <div class="skip-cols-list" id="col-checkboxes"></div>
    <div class="modal-footer">
      <button onclick="cancelColModal()">Cancel</button>
      <button class="primary" onclick="confirmColModal()">Import selected</button>
    </div>
  </div>
</div>

<script>
const TBA_KEY = 'VgSkGjY1Gc1Jps9HhJgKXoTuSWf5GzHPXOQxSsblNE5tN9cCMoHVUTnXUQdGRsq4';
const ALWAYS_SKIP = new Set([
  'org_key','year','event_key','match_key','match_number','time',
  'alliance','scouter','team_key','otherNotes','superNotes',
  'AutoMistake🚩','DidScoreMistake🚩','DidintakeMistake🚩',
  'RedCard','YellowCard','describeAuto','autoCodeTeleop','preferredStrategy',
  'describepizzatoppings','doAutoCodeTeleop','StartPos'
]);

let teams={}, criteria=[], noteTags=['Strategy','Autos','Concerns'];
let sortCol='__total__', sortAsc=false, pendingCSV=null;
let darkMode=false;

function toggleTheme(){
  darkMode=!darkMode;
  document.documentElement.setAttribute('data-theme', darkMode?'dark':'');
  document.getElementById('theme-btn').textContent = darkMode?'Light mode':'Dark mode';
}

function setStatus(msg,type='info'){
  const el=document.getElementById('status-bar');
  el.textContent=msg;
  el.style.color=type==='error'?'var(--danger-text)':type==='success'?'var(--success-text)':'var(--text2)';
}

function parseTeamNum(val){
  if(val==null) return null;
  const s=String(val).trim().toLowerCase().replace('frc','');
  const n=parseInt(s);
  return isNaN(n)?null:n;
}

async function fetchEventData(){
  const code=document.getElementById('event-code').value.trim();
  if(!code){setStatus('Enter an event code','error');return;}
  const btn=document.getElementById('fetch-btn');
  btn.innerHTML='<span class="spinner"></span>Fetching...';
  btn.disabled=true;
  setStatus('Calling Claude to fetch TBA + Statbotics data...');
  try{
    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:`You are a data fetching assistant. The user gives you an FRC event code. Use web search to find and return structured JSON data for that event from The Blue Alliance (thebluealliance.com) and Statbotics (statbotics.io). Return ONLY valid JSON, no markdown, no explanation. Format:
{"teams":[{"num":1912,"name":"Combustion","rank":3,"opr":45.2,"ccwm":12.1,"epa":38.5,"auto_epa":10.2}]}
If a field is unavailable use null. Include all teams at the event.`,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:`Fetch team data for FRC event: ${code}. Get team numbers, names, rankings, OPR, CCWM, EPA, and auto EPA for all teams at this event.`}]
      })
    });
    const data=await resp.json();
    const textBlock=data.content?.find(b=>b.type==='text');
    const raw=textBlock?.text||'';
    const jsonMatch=raw.match(/\{[\s\S]*\}/);
    if(!jsonMatch) throw new Error('No JSON returned from Claude');
    const parsed=JSON.parse(jsonMatch[0]);
    const tbaTeams=parsed.teams||[];
    if(!tbaTeams.length) throw new Error('No teams found — check event code');
    for(const t of tbaTeams){
      const num=t.num;
      if(!teams[num]) teams[num]={num,name:t.name||`Team ${num}`,notes:{},scores:{},dnp:false,tba:{},statbotics:{}};
      else if(t.name) teams[num].name=t.name;
      teams[num].tba={rank:t.rank??'',opr:t.opr!=null?+t.opr.toFixed(1):'',ccwm:t.ccwm!=null?+t.ccwm.toFixed(1):''};
      teams[num].statbotics={epa:t.epa!=null?+t.epa.toFixed(1):'',auto_epa:t.auto_epa!=null?+t.auto_epa.toFixed(1):''};
    }
    ensureTBACols();
    ensureStatboticsCols();
    renderAll();
    setStatus(`Loaded ${tbaTeams.length} teams`,'success');
  }catch(e){
    setStatus('Fetch failed: '+e.message,'error');
  }
  btn.innerHTML='Pull TBA + Statbotics';
  btn.disabled=false;
}

function ensureTBACols(){
  [['rank','Rank'],['opr','OPR'],['ccwm','CCWM']].forEach(([id,name])=>{
    if(!criteria.find(c=>c.id===id)) criteria.push({id,name,weight:1,source:'tba',editable:false});
  });
}
function ensureStatboticsCols(){
  [['epa','EPA'],['auto_epa','Auto EPA']].forEach(([id,name])=>{
    if(!criteria.find(c=>c.id===id)) criteria.push({id,name,weight:1,source:'statbotics',editable:false});
  });
}

function loadCSV(evt,type){
  const file=evt.target.files[0];
  if(!file) return;
  evt.target.value='';
  Papa.parse(file,{header:true,dynamicTyping:true,skipEmptyLines:true,complete(res){
    const rows=res.data,headers=res.meta.fields;
    const teamCol=headers.find(h=>/^team_key$/i.test(h))||headers.find(h=>/team.*num|team.*key|^team$/i.test(h));
    if(!teamCol){setStatus('Could not find team column in CSV','error');return;}
    const grouped={};
    rows.forEach(r=>{
      const num=parseTeamNum(r[teamCol]);
      if(num!=null){if(!grouped[num])grouped[num]=[];grouped[num].push(r);}
    });
    const numCols=headers.filter(h=>{
      if(h===teamCol||ALWAYS_SKIP.has(h)) return false;
      const vals=rows.map(r=>r[h]).filter(v=>v!=null&&v!=='');
      const nc=vals.filter(v=>typeof v==='number'||(!isNaN(parseFloat(v))&&String(v).trim()!=='')).length;
      return vals.length>0&&nc/vals.length>=0.5;
    });
    if(!numCols.length){setStatus(`No numeric columns found in ${type} CSV`,'error');return;}
    pendingCSV={type,numCols,grouped};
    openColModal(type,numCols);
  }});
}

function openColModal(type,cols){
  document.getElementById('col-modal-title').textContent=`Select ${type} scouting columns`;
  document.getElementById('col-checkboxes').innerHTML=cols.map(c=>`
    <label><input type="checkbox" checked value="${c}"> ${c}</label>`).join('');
  document.getElementById('col-modal').style.display='flex';
}
function colCheckAll(v){
  document.querySelectorAll('#col-checkboxes input').forEach(i=>i.checked=v);
}
function cancelColModal(){document.getElementById('col-modal').style.display='none';pendingCSV=null;}
function confirmColModal(){
  document.getElementById('col-modal').style.display='none';
  if(!pendingCSV) return;
  const {type,grouped}=pendingCSV;
  const checked=Array.from(document.querySelectorAll('#col-checkboxes input:checked')).map(i=>i.value);
  if(!checked.length){setStatus('No columns selected','error');pendingCSV=null;return;}
  checked.forEach(col=>{
    const id=`${type}_${col}`;
    if(!criteria.find(c=>c.id===id)) criteria.push({id,name:col,weight:1,source:type,editable:true});
  });
  Object.entries(grouped).forEach(([num,rowArr])=>{
    const n=+num;
    if(!teams[n]) teams[n]={num:n,name:`Team ${n}`,notes:{},scores:{},dnp:false,tba:{},statbotics:{}};
    checked.forEach(col=>{
      const vals=rowArr.map(r=>typeof r[col]==='number'?r[col]:parseFloat(r[col])).filter(v=>!isNaN(v));
      if(vals.length) teams[n].scores[`${type}_${col}`]=+(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2);
    });
  });
  renderAll();
  setStatus(`${type} CSV imported: ${Object.keys(grouped).length} teams, ${checked.length} columns`,'success');
  pendingCSV=null;
}

function addTeamManual(){
  const num=prompt('Team number:');
  if(!num) return;
  const n=parseTeamNum(num);
  if(!n){setStatus('Invalid team number','error');return;}
  if(!teams[n]) teams[n]={num:n,name:`Team ${n}`,notes:{},scores:{},dnp:false,tba:{},statbotics:{}};
  renderAll();
}

function getScore(t,c){
  if(c.source==='tba') return t.tba?.[c.id]??'';
  if(c.source==='statbotics') return t.statbotics?.[c.id]??'';
  return t.scores[c.id]??'';
}
function calcTotal(t){
  let sum=0,wsum=0;
  criteria.forEach(c=>{
    if(!(c.weight>0)) return;
    const v=parseFloat(getScore(t,c));
    if(!isNaN(v)){sum+=v*c.weight;wsum+=c.weight;}
  });
  return wsum>0?+(sum/wsum).toFixed(2):0;
}
function getSorted(){
  const arr=Object.values(teams);
  arr.forEach(t=>t.__total__=calcTotal(t));
  arr.sort((a,b)=>{
    if(a.dnp!==b.dnp) return a.dnp?1:-1;
    let av,bv;
    if(sortCol==='__total__'){av=a.__total__;bv=b.__total__;}
    else if(sortCol==='name'){av=a.name;bv=b.name;}
    else if(sortCol==='num'){av=a.num;bv=b.num;}
    else{const c=criteria.find(x=>x.id===sortCol)||{};av=getScore(a,c);bv=getScore(b,c);}
    if(av===''||av==null) av=sortAsc?Infinity:-Infinity;
    if(bv===''||bv==null) bv=sortAsc?Infinity:-Infinity;
    if(typeof av==='string') return sortAsc?av.localeCompare(bv):bv.localeCompare(av);
    return sortAsc?av-bv:bv-av;
  });
  return arr;
}

function renderAll(){renderTable();renderRankings();renderSummary();}
function renderTable(){
  const sorted=getSorted();
  const si=col=>col===sortCol?(sortAsc?'↑':'↓'):'';
  document.getElementById('thead').innerHTML=`<tr>
    <th onclick="setSort('num')"># ${si('num')}</th>
    <th onclick="setSort('name')">Name ${si('name')}</th>
    ${criteria.map(c=>`<th onclick="setSort('${c.id}')" title="source:${c.source} weight:${c.weight}">${c.name} ${si(c.id)}</th>`).join('')}
    <th onclick="setSort('__total__')">Total ${si('__total__')}</th>
    <th>Notes</th><th>DNP</th></tr>`;
  document.getElementById('tbody').innerHTML=sorted.map(t=>`
    <tr class="${t.dnp?'dnp-row':''}">
      <td><strong>${t.num}</strong></td>
      <td style="white-space:nowrap">${t.name}</td>
      ${criteria.map(c=>{
        const v=getScore(t,c);
        if(!c.editable||c.source==='tba'||c.source==='statbotics')
          return `<td style="text-align:center">${v!==''&&v!=null?v:'—'}</td>`;
        return `<td><input type="number" class="score-input" value="${v!==''?v:''}" placeholder="—" min="0" max="200" step="0.1" onchange="setScore(${t.num},'${c.id}',this.value)"></td>`;
      }).join('')}
      <td class="total-col">${t.__total__}</td>
      <td><div class="notes-fields">${noteTags.map(tag=>`
        <div class="note-row">
          <span class="note-label">${tag}</span>
          <textarea class="note-input" onchange="setNote(${t.num},'${tag}',this.value)" placeholder="${tag}...">${t.notes[tag]||''}</textarea>
        </div>`).join('')}</div></td>
      <td style="text-align:center;vertical-align:middle"><input type="checkbox" ${t.dnp?'checked':''} onchange="toggleDNP(${t.num},this.checked)"></td>
    </tr>`).join('');
}
function renderRankings(){
  const sorted=getSorted();
  const el=document.getElementById('rank-list');
  if(!sorted.length){el.innerHTML='<p style="font-size:12px;color:var(--text3)">No teams yet</p>';return;}
  let rank=0;
  el.innerHTML=sorted.map(t=>{
    if(!t.dnp) rank++;
    return `<div class="rank-item ${t.dnp?'dnp':''}">
      <span class="rank-num">${t.dnp?'—':rank}</span>
      <span style="font-weight:500;font-size:13px">${t.num}</span>
      <span style="font-size:11px;color:var(--text3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-left:3px">${t.name.length>13?t.name.slice(0,13)+'…':t.name}</span>
      <span class="rank-score">${t.__total__}</span>
    </div>`;
  }).join('');
}
function renderSummary(){
  const arr=Object.values(teams),dnp=arr.filter(t=>t.dnp).length;
  document.getElementById('summary').innerHTML=`Teams: ${arr.length}<br>Ranked: ${arr.length-dnp}<br>DNP: ${dnp}<br>Criteria: ${criteria.length}`;
}

function setSort(col){if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=false;}renderTable();renderRankings();}
function setScore(num,id,val){if(!teams[num])return;teams[num].scores[id]=val===''?'':+parseFloat(val).toFixed(2);teams[num].__total__=calcTotal(teams[num]);renderRankings();renderSummary();}
function setNote(num,tag,val){if(teams[num])teams[num].notes[tag]=val;}
function toggleDNP(num,val){if(teams[num]){teams[num].dnp=val;renderAll();}}

function renderTagList(){
  document.getElementById('tag-list').innerHTML=noteTags.map((t,i)=>`
    <span class="tag-chip">${t}<button onclick="removeTag(${i})">×</button></span>`).join('');
}
function addTag(){
  const inp=document.getElementById('new-tag'),val=inp.value.trim();
  if(!val||noteTags.includes(val))return;
  noteTags.push(val);inp.value='';renderTagList();renderTable();
}
function removeTag(i){noteTags.splice(i,1);renderTagList();renderTable();}

function openCriteriaModal(){renderCriteriaModal();document.getElementById('criteria-modal').style.display='flex';}
function closeCriteriaModal(){document.getElementById('criteria-modal').style.display='none';renderAll();}
function renderCriteriaModal(){
  document.getElementById('criteria-list').innerHTML=criteria.map((c,i)=>`
    <div class="criteria-row">
      <input type="text" class="criteria-name" value="${c.name}" onchange="criteria[${i}].name=this.value">
      <input type="number" class="criteria-weight" value="${c.weight}" min="0" max="10" step="0.1" onchange="criteria[${i}].weight=+this.value" title="Weight">
      <span class="badge-src">${c.source||'manual'}</span>
      <button class="danger" onclick="removeCriteria(${i})">×</button>
    </div>`).join('')||'<p style="font-size:12px;color:var(--text3)">No criteria yet.</p>';
}
function addCriteria(){criteria.push({id:'manual_'+Date.now(),name:'New Criteria',weight:1,source:'manual',editable:true});renderCriteriaModal();}
function removeCriteria(i){criteria.splice(i,1);renderCriteriaModal();}

function exportCSV(){
  const sorted=getSorted();
  const headers=['Team','Name',...criteria.map(c=>c.name),'Weighted Total',...noteTags,'DNP'];
  const rows=sorted.map(t=>[t.num,t.name,...criteria.map(c=>getScore(t,c)),t.__total__,...noteTags.map(tag=>t.notes[tag]||''),t.dnp?'Y':'N']);
  const csv=Papa.unparse({fields:headers,data:rows});
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='picklist.csv';a.click();
}
